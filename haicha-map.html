<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>向陽 配車ノート — エリアマップ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0e1a;
      --panel: #13152a;
      --panel2: #1b1e35;
      --border: #252840;
      --text: #dde1f0;
      --muted: #5a607a;
      --cyan: #4FC3F7;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans',
        'Hiragino Kaku Gothic ProN', Meiryo, 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #root { display: flex; flex-direction: column; height: 100%; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px;
      height: 52px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 1000;
    }

    .logo { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
    .logo em { color: var(--cyan); font-style: normal; }

    .date-chip {
      background: var(--panel2); border: 1px solid var(--border);
      border-radius: 5px; padding: 3px 11px;
      font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums;
    }

    .weekday { color: #FF9F43; font-weight: 700; }

    .header-stats { margin-left: auto; display: flex; gap: 20px; }
    .hstat { text-align: right; }
    .hstat-num { font-size: 22px; font-weight: 800; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; }
    .hstat-lbl { font-size: 9px; color: var(--muted); letter-spacing: 0.5px; margin-top: 2px; }

    /* ── MAIN LAYOUT ── */
    .main { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── SIDEBAR ── */
    aside {
      width: 240px; flex-shrink: 0;
      background: var(--panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      z-index: 100;
    }

    .sb-head {
      padding: 13px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .sb-title { font-size: 9.5px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; }

    .sb-controls { display: flex; gap: 5px; margin-top: 9px; }
    .btn-xs {
      flex: 1; padding: 5px 6px; font-size: 10.5px;
      border: 1px solid var(--border); background: var(--panel2);
      color: var(--muted); border-radius: 4px; cursor: pointer;
      transition: all .15s;
    }
    .btn-xs:hover { border-color: var(--cyan); color: var(--cyan); }

    .driver-list { flex: 1; overflow-y: auto; padding: 4px 0; }

    .driver-row {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 14px; cursor: pointer;
      transition: background .1s; user-select: none;
      border-radius: 0;
    }
    .driver-row:hover { background: var(--panel2); }
    .driver-row.off { opacity: .35; }

    .d-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .d-name { font-size: 13px; font-weight: 600; flex: 1; color: #fff; }
    .d-count { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; font-weight: 500; }
    .d-veh {
      font-size: 9.5px; color: var(--muted);
      background: var(--panel2); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px;
    }

    .sb-foot { padding: 12px 14px; border-top: 1px solid var(--border); }
    .oil-tabs { display: flex; gap: 4px; margin-top: 8px; }
    .oil-tab {
      flex: 1; padding: 5px 0; font-size: 10.5px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); border-radius: 4px; cursor: pointer; transition: all .15s;
    }
    .oil-tab.on { background: var(--cyan); border-color: var(--cyan); color: #000; font-weight: 700; }

    /* ── MAP ── */
    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    .leaflet-container { background: #0c0e1a !important; }
    .leaflet-control-attribution { background: rgba(13,15,26,.8) !important; color: var(--muted) !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: var(--muted) !important; }
    .leaflet-control-zoom a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--panel2) !important; }

    .marker-label {
      position: absolute;
      white-space: nowrap;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,.9);
      pointer-events: none;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ── DETAIL PANEL ── */
    #detail {
      position: absolute; right: 0; top: 0;
      width: 290px; height: 100%;
      background: var(--panel); border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.25,.8,.25,1);
      z-index: 500; display: flex; flex-direction: column;
    }
    #detail.open { transform: none; }

    .dp-head {
      padding: 15px 14px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .dp-company { font-size: 15px; font-weight: 800; color: #fff; line-height: 1.35; }
    .dp-driver { display: inline-flex; align-items: center; gap: 5px; margin-top: 6px; }
    .dp-driver-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dp-driver-name { font-size: 11px; color: var(--muted); }

    .dp-close {
      width: 26px; height: 26px; flex-shrink: 0;
      border: 1px solid var(--border); background: var(--panel2);
      border-radius: 4px; cursor: pointer; color: var(--muted);
      font-size: 13px; display: flex; align-items: center; justify-content: center;
    }
    .dp-close:hover { color: #fff; border-color: #fff; }

    .dp-body { padding: 14px; display: flex; flex-direction: column; gap: 11px; overflow-y: auto; flex: 1; }

    .dp-field {}
    .dp-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
    .dp-val { font-size: 12.5px; color: var(--text); line-height: 1.5; }

    .oil-tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 9px; border-radius: 4px; font-size: 11px; font-weight: 700; border: 1px solid;
    }
    .oil-tag.軽油 { color: #4FC3F7; border-color: rgba(79,195,247,.3); background: rgba(79,195,247,.1); }
    .oil-tag.重油 { color: #FF7043; border-color: rgba(255,112,67,.3); background: rgba(255,112,67,.1); }
    .oil-tag.灯油 { color: #A5D6A7; border-color: rgba(165,214,167,.3); background: rgba(165,214,167,.1); }

    .time-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 9px; border-radius: 4px; font-size: 11px; font-weight: 600;
      border: 1px solid rgba(255,159,67,.3); background: rgba(255,159,67,.08); color: #FF9F43;
    }

    .tel-val { color: var(--cyan); font-size: 12.5px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* pulse anim for active marker */
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 currentColor; }
      70% { transform: scale(1.1); box-shadow: 0 0 0 6px transparent; }
      100% { transform: scale(1); box-shadow: 0 0 0 0 transparent; }
    }

    /* map legend */
    #legend {
      position: absolute; bottom: 22px; left: 14px; z-index: 900;
      background: rgba(13,15,26,.88); border: 1px solid var(--border);
      border-radius: 7px; padding: 10px 12px;
      backdrop-filter: blur(6px);
    }
    #legend .leg-title { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 7px; }
    .leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; font-size: 11px; }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .leg-name { color: var(--text); }
    .leg-cnt { margin-left: auto; color: var(--muted); font-size: 10px; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
<div id="root">
  <header>
    <div class="logo">向陽 <em>配車ノート</em></div>
    <div class="date-chip">2026.05.26 <span class="weekday">（火）</span></div>
    <div class="header-stats">
      <div class="hstat">
        <div class="hstat-num" id="h-total">0</div>
        <div class="hstat-lbl">本日配車件数</div>
      </div>
      <div class="hstat">
        <div class="hstat-num" id="h-drivers">0</div>
        <div class="hstat-lbl">稼働ドライバー</div>
      </div>
    </div>
  </header>

  <div class="main">
    <aside>
      <div class="sb-head">
        <div class="sb-title">ドライバー</div>
        <div class="sb-controls">
          <button class="btn-xs" onclick="App.showAll()">全員表示</button>
          <button class="btn-xs" onclick="App.hideAll()">全員非表示</button>
        </div>
      </div>
      <div class="driver-list" id="driver-list"></div>
      <div class="sb-foot">
        <div class="sb-title">油種フィルタ</div>
        <div class="oil-tabs">
          <button class="oil-tab on" data-oil="all"  onclick="App.filterOil(this)">全て</button>
          <button class="oil-tab"    data-oil="軽油" onclick="App.filterOil(this)">軽油</button>
          <button class="oil-tab"    data-oil="重油" onclick="App.filterOil(this)">重油</button>
          <button class="oil-tab"    data-oil="灯油" onclick="App.filterOil(this)">灯油</button>
        </div>
      </div>
    </aside>

    <div id="map-wrap">
      <div id="map"></div>

      <!-- floating legend -->
      <div id="legend">
        <div class="leg-title">凡例</div>
        <div id="legend-body"></div>
      </div>

      <!-- detail slide panel -->
      <div id="detail">
        <div class="dp-head">
          <div>
            <div class="dp-company" id="dp-company">-</div>
            <div class="dp-driver">
              <div class="dp-driver-dot" id="dp-ddot"></div>
              <div class="dp-driver-name" id="dp-dname"></div>
            </div>
          </div>
          <div class="dp-close" onclick="App.closeDetail()">✕</div>
        </div>
        <div class="dp-body">
          <div class="dp-field">
            <div class="dp-lbl">住所</div>
            <div class="dp-val" id="dp-addr">-</div>
          </div>
          <div class="dp-field">
            <div class="dp-lbl">油種</div>
            <div class="dp-val" id="dp-oil"></div>
          </div>
          <div class="dp-field">
            <div class="dp-lbl">時間指定</div>
            <div class="dp-val" id="dp-time">-</div>
          </div>
          <div class="dp-field" id="dp-veh-f" style="display:none">
            <div class="dp-lbl">車両 No.</div>
            <div class="dp-val" id="dp-veh">-</div>
          </div>
          <div class="dp-field" id="dp-tel-f" style="display:none">
            <div class="dp-lbl">電話番号</div>
            <div class="dp-val tel-val" id="dp-tel">-</div>
          </div>
          <div class="dp-field" id="dp-note-f" style="display:none">
            <div class="dp-lbl">備考</div>
            <div class="dp-val" id="dp-note">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

/* ═══════════════════════════════════════════════
   APP
═══════════════════════════════════════════════ */
const App = (() => {
  let map, layerGroup;
  let activeOil = 'all';
  let openMarkerId = null;

  const drMap = {};
  DRIVERS.forEach(d => drMap[d.id] = d);

  /* ── init ── */
  function init() {
    map = L.map('map', { center:[35.685, 139.38], zoom:12, zoomControl:true });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution:'&copy; OpenStreetMap &copy; CARTO',
      subdomains:'abcd', maxZoom:19
    }).addTo(map);

    layerGroup = L.layerGroup().addTo(map);

    map.on('click', () => closeDetail());

    buildSidebar();
    buildLegend();
    renderMarkers();
    updateHeader();
  }

  /* ── sidebar ── */
  function buildSidebar() {
    const el = document.getElementById('driver-list');
    el.innerHTML = '';
    DRIVERS.forEach(d => {
      const count = DELIVERIES.filter(x => x.driver === d.id).length;
      const row = document.createElement('div');
      row.className = 'driver-row' + (d.active ? '' : ' off');
      row.id = 'dr-' + d.id;
      row.innerHTML = `
        <div class="d-dot" style="background:${d.color}"></div>
        <div class="d-name">${d.name}</div>
        ${d.vehicle ? `<div class="d-veh">${d.vehicle}号</div>` : ''}
        <div class="d-count">${count}件</div>
      `;
      row.addEventListener('click', () => toggleDriver(d.id));
      el.appendChild(row);
    });
  }

  function buildLegend() {
    const el = document.getElementById('legend-body');
    el.innerHTML = '';
    DRIVERS.forEach(d => {
      const count = getVisible().filter(x => x.driver === d.id).length;
      el.innerHTML += `
        <div class="leg-row">
          <div class="leg-dot" style="background:${d.color}"></div>
          <div class="leg-name">${d.name}</div>
          <div class="leg-cnt">${count}</div>
        </div>`;
    });
  }

  /* ── markers ── */
  function getVisible() {
    return DELIVERIES.filter(d => {
      const dr = drMap[d.driver];
      if (!dr.active) return false;
      if (activeOil !== 'all' && d.oil !== activeOil) return false;
      return true;
    });
  }

  function renderMarkers() {
    layerGroup.clearLayers();
    const visible = getVisible();

    visible.forEach(del => {
      const dr = drMap[del.driver];
      const icon = L.divIcon({
        className: '',
        html: `<div style="
          width:13px; height:13px; border-radius:50%;
          background:${dr.color}; border:2px solid #fff;
          box-shadow:0 2px 8px rgba(0,0,0,.5);
          cursor:pointer;
          transition: transform .15s;
        " data-id="${del.id}"></div>`,
        iconSize:[13,13],
        iconAnchor:[6,6],
        popupAnchor:[0,-10]
      });

      const m = L.marker([del.lat, del.lng], { icon })
        .addTo(layerGroup)
        .bindTooltip(`<b>${del.company}</b><br><small>${del.address}</small>`, {
          className: 'custom-tip',
          direction: 'top', offset:[0,-10]
        });

      m.on('click', e => {
        e.originalEvent.stopPropagation();
        openDetail(del);
      });
    });

    buildLegend();
    updateHeader();
  }

  /* ── detail panel ── */
  function openDetail(del) {
    const dr = drMap[del.driver];
    const panel = document.getElementById('detail');

    document.getElementById('dp-company').textContent = del.company;
    document.getElementById('dp-ddot').style.background = dr.color;
    document.getElementById('dp-dname').textContent = dr.name + ' ドライバー';
    document.getElementById('dp-addr').textContent = del.address;
    document.getElementById('dp-time').innerHTML = del.time !== '-'
      ? `<span class="time-tag">⏰ ${del.time}</span>`
      : '<span style="color:var(--muted)">指定なし</span>';

    document.getElementById('dp-oil').innerHTML = `<span class="oil-tag ${del.oil}">${del.oil}</span>`;

    const vehF = document.getElementById('dp-veh-f');
    if (del.veh) {
      vehF.style.display = '';
      document.getElementById('dp-veh').textContent = del.veh + '号車';
    } else { vehF.style.display = 'none'; }

    const telF = document.getElementById('dp-tel-f');
    if (del.tel) {
      telF.style.display = '';
      document.getElementById('dp-tel').innerHTML = `<a href="tel:${del.tel}" style="color:var(--cyan)">${del.tel}</a>`;
    } else { telF.style.display = 'none'; }

    const noteF = document.getElementById('dp-note-f');
    if (del.note) {
      noteF.style.display = '';
      document.getElementById('dp-note').textContent = del.note;
    } else { noteF.style.display = 'none'; }

    panel.classList.add('open');
    openMarkerId = del.id;

    map.panTo([del.lat, del.lng], { animate:true, duration:.4 });
  }

  function closeDetail() {
    document.getElementById('detail').classList.remove('open');
    openMarkerId = null;
  }

  /* ── driver toggle ── */
  function toggleDriver(id) {
    const dr = drMap[id];
    dr.active = !dr.active;
    const row = document.getElementById('dr-' + id);
    row.classList.toggle('off', !dr.active);
    renderMarkers();
    updateHeader();
  }

  function showAll() {
    DRIVERS.forEach(d => { d.active = true; document.getElementById('dr-'+d.id).classList.remove('off'); });
    renderMarkers(); updateHeader();
  }

  function hideAll() {
    DRIVERS.forEach(d => { d.active = false; document.getElementById('dr-'+d.id).classList.add('off'); });
    renderMarkers(); updateHeader();
  }

  /* ── oil filter ── */
  function filterOil(btn) {
    document.querySelectorAll('.oil-tab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeOil = btn.dataset.oil;
    renderMarkers();
  }

  /* ── header stats ── */
  function updateHeader() {
    const v = getVisible();
    document.getElementById('h-total').textContent = v.length;
    const activeDrivers = new Set(v.map(x => x.driver)).size;
    document.getElementById('h-drivers').textContent = activeDrivers;
  }

  return { init, showAll, hideAll, filterOil, closeDetail };
})();

/* ── Leaflet tooltip style ── */

style.textContent = `
  .custom-tip {
    background: #1b1e35 !important;
    border: 1px solid #252840 !important;
    border-radius: 5px !important;
    color: #dde1f0 !important;
    font-size: 11px !important;
    padding: 4px 8px !important;
    box-shadow: 0 4px 12px rgba(0,0,0,.5) !important;
  }
  .leaflet-tooltip-top.custom-tip::before { border-top-color: #252840 !important; }
`;
document.head.appendChild(style);

/* ── Start ── */
window.addEventListener('DOMContentLoaded', App.init);
</script>
